name: agelapse
description: A powerful tool for creating stabilized aging timelapses.
publish_to: 'none'

version: 2.5.2+39

environment:
  sdk: ">=3.1.0 <4.0.0"
  flutter: ">=3.3.0"

dependencies:
  animated_bottom_navigation_bar: ^1.4.0
  archive: ^4.0.7
  async_zip: ^0.1.0
  camera: ^0.12.0+1
  camera_desktop: ^1.0.8
  chewie: ^1.13.0
  desktop_drop:
    git:
      url: https://github.com/hugocornellier/desktop_drop_custom.git
  device_info_plus: ^12.4.0
  downloadsfolder: ^1.2.0
  exif_reader: ^4.1.0
  cat_detection: ^1.0.0
  dog_detection: ^1.0.0
  face_detection_tflite: ^5.0.13
  ffmpeg_kit_flutter_new:
    git:
      url: https://github.com/hugocornellier/ffmpeg_kit_flutter.git
      ref: e028e10
  file_picker: ^10.3.10
  file_selector: ^1.1.0
  flutter:
    sdk: flutter
  flutter_avif: ^3.1.0
  flutter_colorpicker: ^1.1.0
  flutter_launcher_icons: ^0.14.4
  flutter_local_notifications: ^21.0.0
  flutter_native_splash: ^2.4.7
  flutter_svg: ^2.2.4
  flutter_timezone: ^5.0.2
  font_awesome_flutter: ^11.0.0
  heic_native: ^0.1.1
  intl: ^0.20.2
  media_kit: ^1.2.6
  media_kit_libs_linux: ^1.2.1
  media_kit_libs_windows_video: ^1.0.11
  media_kit_video: ^2.0.1
  mime: ^2.0.0
  opencv_dart: 2.2.1+4
  package_info_plus: ^9.0.1
  path: ^1.9.1
  path_provider: ^2.1.5
  permission_handler: ^12.0.1
  pose_detection: ^2.0.7
  provider: ^6.1.5
  saver_gallery: ^4.1.0
  sensors_plus: ^7.0.0
  share_plus: ^12.0.2
  smooth_page_indicator: ^2.0.1
  sqflite: ^2.4.2
  sqflite_common_ffi: ^2.4.0
  sqlite3_flutter_libs: ^0.5.42
  timezone: ^0.11.0
  url_launcher: ^6.3.2
  vibration: ^3.1.5
  video_player: ^2.11.1
  video_player_media_kit: ^2.0.0
  video_player_win: ^3.2.2
  wakelock_plus: ^1.5.1
  wechat_assets_picker: ^10.1.1
  window_manager: ^0.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_lints: ^6.0.0
  mocktail: ^1.0.4
  image: ^4.7.2

flutter:
  config:
    enable-swift-package-manager: false
  uses-material-design: true

  assets:
    - assets/images/
    - assets/ghost-custom.svg
    # ffmpeg.exe is only needed on Windows (Android uses FFmpegKit, macOS/Linux
    # use system ffmpeg). The platforms: key ensures it's only bundled for Windows.
    - path: assets/ffmpeg/windows/ffmpeg.exe
      platforms:
        - windows
    - path: assets/ffmpeg/windows/libgcc_s_seh-1.dll
      platforms:
        - windows
    - path: assets/ffmpeg/windows/libwinpthread-1.dll
      platforms:
        - windows
    - path: assets/ffmpeg/windows/LICENSE
      platforms:
        - windows
    # Test fixtures are loaded from the filesystem on desktop (see test_utils.dart).
    # Only declared here for mobile integration tests (rootBundle extraction).
    # Uncomment if running integration tests on Android/iOS devices.
    # - assets/test_fixtures/sample_faces/
    # - assets/test_fixtures/sample_dogs/
    # - assets/test_fixtures/sample_cats/
    # - assets/test_fixtures/sample_poses/
    # - assets/test_fixtures/sample-avif.avif
    # - assets/test_fixtures/sample-heic.HEIC
    # - assets/test_fixtures/format_samples/jpg/
    # - assets/test_fixtures/format_samples/png/
    # - assets/test_fixtures/format_samples/webp/
    # - assets/test_fixtures/format_samples/bmp/
    # - assets/test_fixtures/format_samples/tiff/
    # - assets/test_fixtures/format_samples/heic/
    # - assets/test_fixtures/format_samples/avif/
    # - assets/test_fixtures/format_samples/jp2/
    # Font licenses (for legal compliance)
    - assets/fonts/Inter/OFL.txt
    - assets/fonts/Roboto/LICENSE.txt
    - assets/fonts/SourceSans3/OFL.txt
    - assets/fonts/Nunito/OFL.txt
    - assets/fonts/JetBrainsMono/OFL.txt

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter/Inter-Regular.ttf
        - asset: assets/fonts/Inter/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter/Inter-SemiBold.ttf
          weight: 600
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto/Roboto-Regular.ttf
        - asset: assets/fonts/Roboto/Roboto-Medium.ttf
          weight: 500
        - asset: assets/fonts/Roboto/Roboto-Bold.ttf
          weight: 700
    - family: SourceSans3
      fonts:
        - asset: assets/fonts/SourceSans3/SourceSans3-Regular.ttf
        - asset: assets/fonts/SourceSans3/SourceSans3-Medium.ttf
          weight: 500
        - asset: assets/fonts/SourceSans3/SourceSans3-SemiBold.ttf
          weight: 600
    - family: Nunito
      fonts:
        - asset: assets/fonts/Nunito/Nunito-Variable.ttf
    - family: JetBrainsMono
      fonts:
        - asset: assets/fonts/JetBrainsMono/JetBrainsMono-Regular.ttf
        - asset: assets/fonts/JetBrainsMono/JetBrainsMono-Medium.ttf
          weight: 500
        - asset: assets/fonts/JetBrainsMono/JetBrainsMono-Bold.ttf
          weight: 700

flutter_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.jpg"

flutter_native_splash:
  color: "#2b2b2b"
  image: assets/images/splash/logo.png
  android_12:
    color: "#2b2b2b"
    image: assets/images/splash/logo-android.png
