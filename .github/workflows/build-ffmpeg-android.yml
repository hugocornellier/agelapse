name: Build FFmpeg (Android)

on:
  workflow_dispatch:

jobs:
  build:
    name: Build minimal FFmpeg AAR
    runs-on: ubuntu-latest
    timeout-minutes: 120

    env:
      FFMPEG_VERSION: "n6.1.2"
      NDK_VERSION: "27.2.12479018"
      API_LEVEL: "24"
      # ABIs to build (matching current AAR)
      ABIS: "arm64-v8a armeabi-v7a x86_64"

    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            build-essential nasm yasm pkg-config \
            curl git unzip zip

      - name: Setup Android NDK
        run: |
          ANDROID_HOME="${ANDROID_HOME:-$HOME/android-sdk}"
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          SDKMANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          yes | $SDKMANAGER --install "ndk;$NDK_VERSION" || true
          echo "NDK_HOME=$ANDROID_HOME/ndk/$NDK_VERSION" >> $GITHUB_ENV

      - name: Clone FFmpeg source
        run: |
          git clone --depth 1 -b $FFMPEG_VERSION https://git.ffmpeg.org/ffmpeg.git /tmp/ffmpeg-src

      - name: Patch FFmpeg thread-local log level
        run: |
          # Make av_log_level thread-local so concurrent FFmpeg sessions
          # (as used by FFmpegKit's multi-session API) don't share log level state.
          sed -i 's/static int av_log_level/__thread int av_log_level/g' /tmp/ffmpeg-src/libavutil/log.c
          echo "=== Patched log.c ==="
          grep -n 'av_log_level' /tmp/ffmpeg-src/libavutil/log.c | head -5

      - name: Build freetype and harfbuzz for each ABI
        run: |
          FREETYPE_VERSION="2.13.3"
          HARFBUZZ_VERSION="14.1.0"

          cd /tmp
          curl -L -o freetype.tar.xz "https://download.savannah.gnu.org/releases/freetype/freetype-${FREETYPE_VERSION}.tar.xz"
          curl -L -o harfbuzz.tar.xz "https://github.com/harfbuzz/harfbuzz/releases/download/${HARFBUZZ_VERSION}/harfbuzz-${HARFBUZZ_VERSION}.tar.xz"
          tar xf freetype.tar.xz
          tar xf harfbuzz.tar.xz

          for ABI in $ABIS; do
            echo "=== Building freetype + harfbuzz for $ABI ==="

            case $ABI in
              arm64-v8a)   ARCH=aarch64; TRIPLE=aarch64-linux-android ;;
              armeabi-v7a) ARCH=arm;     TRIPLE=armv7a-linux-androideabi ;;
              x86_64)      ARCH=x86_64;  TRIPLE=x86_64-linux-android ;;
            esac

            TOOLCHAIN="$NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64"
            CC="${TOOLCHAIN}/bin/${TRIPLE}${API_LEVEL}-clang"
            CXX="${TOOLCHAIN}/bin/${TRIPLE}${API_LEVEL}-clang++"
            AR="${TOOLCHAIN}/bin/llvm-ar"
            RANLIB="${TOOLCHAIN}/bin/llvm-ranlib"
            STRIP="${TOOLCHAIN}/bin/llvm-strip"
            PREFIX="/tmp/deps-${ABI}"

            # Build freetype (static, no harfbuzz to break circular dep)
            cd /tmp/freetype-${FREETYPE_VERSION}
            make distclean 2>/dev/null || true
            ./configure \
              --host=$TRIPLE \
              --prefix=$PREFIX \
              --enable-static --disable-shared \
              --with-zlib=no --with-bzip2=no --with-png=no --with-harfbuzz=no --with-brotli=no \
              CC="$CC" AR="$AR" RANLIB="$RANLIB"
            make -j$(nproc) && make install

            # Build harfbuzz (static, minimal)
            cd /tmp/harfbuzz-${HARFBUZZ_VERSION}
            rm -rf build-${ABI}
            cmake -B build-${ABI} \
              -DCMAKE_TOOLCHAIN_FILE="${NDK_HOME}/build/cmake/android.toolchain.cmake" \
              -DANDROID_ABI=$ABI \
              -DANDROID_PLATFORM=android-${API_LEVEL} \
              -DCMAKE_INSTALL_PREFIX=$PREFIX \
              -DCMAKE_PREFIX_PATH=$PREFIX \
              -DCMAKE_FIND_ROOT_PATH=$PREFIX \
              -DFREETYPE_LIBRARY=$PREFIX/lib/libfreetype.a \
              -DFREETYPE_INCLUDE_DIRS=$PREFIX/include/freetype2 \
              -DBUILD_SHARED_LIBS=OFF \
              -DHB_HAVE_FREETYPE=ON \
              -DHB_HAVE_GLIB=OFF \
              -DHB_HAVE_GOBJECT=OFF \
              -DHB_HAVE_ICU=OFF \
              -DHB_HAVE_CAIRO=OFF \
              -DHB_BUILD_SUBSET=OFF
            cmake --build build-${ABI} -j$(nproc)
            cmake --install build-${ABI}

            echo "=== $ABI deps built: $(ls $PREFIX/lib/*.a | wc -l) static libs ==="
          done

      - name: Build x264 for each ABI
        run: |
          cd /tmp
          git clone --depth 1 https://code.videolan.org/videolan/x264.git x264-src

          for ABI in $ABIS; do
            echo "=== Building x264 for $ABI ==="

            case $ABI in
              arm64-v8a)   ARCH=aarch64; TRIPLE=aarch64-linux-android; X264_ARCH=aarch64 ;;
              armeabi-v7a) ARCH=arm;     TRIPLE=armv7a-linux-androideabi; X264_ARCH=arm ;;
              x86_64)      ARCH=x86_64;  TRIPLE=x86_64-linux-android; X264_ARCH=x86_64 ;;
            esac

            TOOLCHAIN="$NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64"
            CC="${TOOLCHAIN}/bin/${TRIPLE}${API_LEVEL}-clang"
            PREFIX="/tmp/deps-${ABI}"

            cd /tmp/x264-src
            make distclean 2>/dev/null || true
            CC="$CC" ./configure \
              --host=$TRIPLE \
              --cross-prefix="${TOOLCHAIN}/bin/llvm-" \
              --sysroot="${TOOLCHAIN}/sysroot" \
              --prefix=$PREFIX \
              --enable-static \
              --disable-cli \
              --enable-pic
            make -j$(nproc) && make install
          done

      - name: Build libvpx for each ABI
        run: |
          cd /tmp
          git clone --depth 1 -b v1.15.0 https://chromium.googlesource.com/webm/libvpx.git vpx-src

          for ABI in $ABIS; do
            echo "=== Building libvpx for $ABI ==="

            case $ABI in
              arm64-v8a)   VPX_TARGET=arm64-android-gcc;  TRIPLE=aarch64-linux-android ;;
              armeabi-v7a) VPX_TARGET=armv7-android-gcc;   TRIPLE=armv7a-linux-androideabi ;;
              x86_64)      VPX_TARGET=x86_64-android-gcc;  TRIPLE=x86_64-linux-android ;;
            esac

            TOOLCHAIN="$NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64"
            CC="${TOOLCHAIN}/bin/${TRIPLE}${API_LEVEL}-clang"
            CXX="${TOOLCHAIN}/bin/${TRIPLE}${API_LEVEL}-clang++"
            PREFIX="/tmp/deps-${ABI}"

            cd /tmp/vpx-src
            make distclean 2>/dev/null || true
            CROSS="${TOOLCHAIN}/bin/llvm-" \
            CC="$CC" CXX="$CXX" \
            AR="${TOOLCHAIN}/bin/llvm-ar" \
            NM="${TOOLCHAIN}/bin/llvm-nm" \
            STRIP="${TOOLCHAIN}/bin/llvm-strip" \
            ./configure \
              --target=$VPX_TARGET \
              --prefix=$PREFIX \
              --libc="${TOOLCHAIN}/sysroot" \
              --enable-static --disable-shared \
              --disable-examples --disable-tools --disable-docs \
              --disable-unit-tests \
              --enable-vp9-encoder --enable-vp9-decoder \
              --enable-vp8-encoder --enable-vp8-decoder \
              --enable-pic
            make -j$(nproc) && make install
          done

      - name: Build FFmpeg for each ABI
        run: |
          for ABI in $ABIS; do
            echo "=========================================="
            echo "=== Building FFmpeg for $ABI ==="
            echo "=========================================="

            case $ABI in
              arm64-v8a)
                ARCH=aarch64; TRIPLE=aarch64-linux-android
                EXTRA_CFLAGS="-march=armv8-a"
                EXTRA_FFMPEG="--enable-neon"
                ;;
              armeabi-v7a)
                ARCH=arm; TRIPLE=armv7a-linux-androideabi
                EXTRA_CFLAGS="-march=armv7-a -mfloat-abi=softfp -mfpu=neon"
                EXTRA_FFMPEG="--enable-neon"
                ;;
              x86_64)
                ARCH=x86_64; TRIPLE=x86_64-linux-android
                EXTRA_CFLAGS=""
                EXTRA_FFMPEG=""
                ;;
            esac

            TOOLCHAIN="$NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64"
            CC="${TOOLCHAIN}/bin/${TRIPLE}${API_LEVEL}-clang"
            CXX="${TOOLCHAIN}/bin/${TRIPLE}${API_LEVEL}-clang++"
            STRIP="${TOOLCHAIN}/bin/llvm-strip"
            PREFIX="/tmp/ffmpeg-out-${ABI}"
            DEPS="/tmp/deps-${ABI}"

            cd /tmp/ffmpeg-src
            make distclean 2>/dev/null || true

            PKG_CONFIG_PATH="${DEPS}/lib/pkgconfig" \
            PKG_CONFIG_LIBDIR="${DEPS}/lib/pkgconfig" \
            ./configure \
              --prefix=$PREFIX \
              --cross-prefix="${TOOLCHAIN}/bin/llvm-" \
              --sysroot="${TOOLCHAIN}/sysroot" \
              --pkg-config=pkg-config \
              --target-os=android \
              --arch=$ARCH \
              --cc="$CC" \
              --cxx="$CXX" \
              --strip="$STRIP" \
              --enable-cross-compile \
              --enable-pic \
              --enable-shared \
              --disable-static \
              --enable-gpl \
              --enable-small \
              --enable-lto \
              --enable-jni \
              --enable-pthreads \
              --enable-swscale \
              --enable-avformat \
              --enable-avcodec \
              --enable-avfilter \
              --enable-avdevice \
              --disable-everything \
              --disable-doc \
              --disable-programs \
              --disable-autodetect \
              --enable-encoder=libx264 \
              --enable-encoder=libvpx_vp9 \
              --enable-decoder=png \
              --enable-decoder=wrapped_avframe \
              --enable-muxer=mp4 \
              --enable-muxer=webm \
              --enable-muxer=matroska \
              --enable-demuxer=concat \
              --enable-demuxer=image2 \
              --enable-filter=split \
              --enable-filter=format \
              --enable-filter=scale \
              --enable-filter=crop \
              --enable-filter=gblur \
              --enable-filter=overlay \
              --enable-filter=colorchannelmixer \
              --enable-filter=color \
              --enable-filter=drawtext \
              --enable-libx264 \
              --enable-libvpx \
              --enable-libfreetype \
              --enable-libharfbuzz \
              --enable-protocol=file \
              --enable-indev=lavfi \
              --enable-zlib \
              $EXTRA_FFMPEG \
              --extra-cflags="-I${DEPS}/include $EXTRA_CFLAGS" \
              --extra-ldflags="-L${DEPS}/lib" \
              --pkg-config-flags=--static

            make -j$(nproc)
            make install

            # Save config.h and config_components.h per ABI — the wrapper's vendored
            # fftools code #includes these, and they contain arch-specific defines.
            # Without per-ABI copies, only the last ABI's config survives in /tmp/ffmpeg-src.
            mkdir -p /tmp/ffmpeg-config-${ABI}
            cp config.h /tmp/ffmpeg-config-${ABI}/ 2>/dev/null || true
            cp config_components.h /tmp/ffmpeg-config-${ABI}/ 2>/dev/null || true
            cp libavutil/avconfig.h /tmp/ffmpeg-config-${ABI}/ 2>/dev/null || true
            cp libavutil/ffversion.h /tmp/ffmpeg-config-${ABI}/ 2>/dev/null || true

            echo "=== $ABI libraries ==="
            ls -lh $PREFIX/lib/*.so* 2>/dev/null || ls -lh $PREFIX/lib/*.so 2>/dev/null
          done

      - name: Verify drawtext filter
        run: |
          for ABI in $ABIS; do
            echo "=== $ABI filters ==="
            # Use readelf to check symbols for drawtext presence
            readelf -d /tmp/ffmpeg-out-${ABI}/lib/libavfilter.so 2>/dev/null | head -5
            echo "libavfilter size: $(du -h /tmp/ffmpeg-out-${ABI}/lib/libavfilter.so | cut -f1)"
          done

      - name: Clone and patch arthenica ffmpeg-kit v6 wrapper source
        run: |
          git clone --depth 1 -b v6.0.LTS https://github.com/arthenica/ffmpeg-kit.git /tmp/ffmpeg-kit-src

          WRAPPER_SRC="/tmp/ffmpeg-kit-src/android/ffmpeg-kit-android-lib/src/main/cpp"

          # Rename JNI symbols from arthenica -> antonkarpenko across all source files.
          # The JNI class path strings appear in ffmpegkit.c and ffmpegkit_abidetect.c,
          # but we apply to all .c and .h files to be thorough.
          find "${WRAPPER_SRC}" \( -name '*.c' -o -name '*.h' \) \
            -exec sed -i 's/arthenica/antonkarpenko/g' {} +

          # Disable SAF (Storage Access Framework) protocol — not needed for AgeLapse
          # and av_set_saf_open/av_set_saf_close are FFmpegKit-specific patches not
          # present in vanilla FFmpeg 6.
          sed -i 's| av_set_saf|//av_set_saf|g' "${WRAPPER_SRC}/ffmpegkit.c"

          echo "=== Patched wrapper source files ==="
          echo "Remaining 'arthenica' refs (should be 0):"
          grep -r 'arthenica' "${WRAPPER_SRC}" || echo "  none"
          echo "SAF calls in ffmpegkit.c (should be commented out):"
          grep -n 'av_set_saf' "${WRAPPER_SRC}/ffmpegkit.c" | head -5

      - name: Build FFmpegKit wrapper for each ABI
        run: |
          WRAPPER_SRC="/tmp/ffmpeg-kit-src/android/ffmpeg-kit-android-lib/src/main/cpp"
          BUILD_DATE=$(date +%Y%m%d)

          for ABI in $ABIS; do
            echo "=== Building FFmpegKit wrapper for $ABI ==="

            case $ABI in
              arm64-v8a)   TRIPLE=aarch64-linux-android ;;
              armeabi-v7a) TRIPLE=armv7a-linux-androideabi ;;
              x86_64)      TRIPLE=x86_64-linux-android ;;
            esac

            TOOLCHAIN="$NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64"
            CC="${TOOLCHAIN}/bin/${TRIPLE}${API_LEVEL}-clang"
            STRIP="${TOOLCHAIN}/bin/llvm-strip"
            FFMPEG_PREFIX="/tmp/ffmpeg-out-${ABI}"
            OUT_DIR="/tmp/ffmpegkit-out-${ABI}"
            mkdir -p $OUT_DIR

            # Collect all .c files from the wrapper cpp directory (~20 files),
            # excluding ffmpegkit_abidetect.c which is built as its own separate .so.
            WRAPPER_C_FILES=$(find "${WRAPPER_SRC}" -name '*.c' ! -name 'ffmpegkit_abidetect.c' | sort | tr '\n' ' ')
            echo "Wrapper .c files: $(echo $WRAPPER_C_FILES | wc -w) files"

            # Use per-ABI config.h (saved during FFmpeg build) so ARM builds
            # don't pick up x86 asm constraints from the wrong config.
            FFMPEG_CONFIG="/tmp/ffmpeg-config-${ABI}"

            # Build libffmpegkit.so — the JNI bridge between Java and FFmpeg 6
            $CC -shared -o $OUT_DIR/libffmpegkit.so \
              -I${FFMPEG_CONFIG} \
              -I${FFMPEG_PREFIX}/include \
              -I/tmp/ffmpeg-src \
              -I${WRAPPER_SRC} \
              -L${FFMPEG_PREFIX}/lib \
              -fPIC \
              -Wno-implicit-function-declaration \
              -DFFMPEG_KIT_BUILD_DATE=${BUILD_DATE} \
              -DFFMPEG_KIT_LTS \
              $WRAPPER_C_FILES \
              -lavfilter -lavformat -lavcodec -lavdevice \
              -lswscale -lswresample -lavutil \
              -lm -lz -llog -landroid

            # Build ffmpegkit_abidetect.so (loaded first by NativeLoader.java to
            # detect the ABI before loading the remaining libraries).
            # Needs NDK cpufeatures for android_getCpuFamily/android_getCpuFeatures.
            CPUFEATURES="$NDK_HOME/sources/android/cpufeatures"
            $CC -shared -o $OUT_DIR/libffmpegkit_abidetect.so \
              -I${FFMPEG_CONFIG} \
              -I${FFMPEG_PREFIX}/include \
              -I/tmp/ffmpeg-src \
              -I${WRAPPER_SRC} \
              -I${CPUFEATURES} \
              -L${FFMPEG_PREFIX}/lib \
              -fPIC \
              -Wno-implicit-function-declaration \
              -DFFMPEG_KIT_BUILD_DATE=${BUILD_DATE} \
              -DFFMPEG_KIT_LTS \
              "${WRAPPER_SRC}/ffmpegkit_abidetect.c" \
              "${CPUFEATURES}/cpu-features.c" \
              -llog

            ls -lh $OUT_DIR/
          done

      - name: Package AAR
        run: |
          AAR_DIR="/tmp/ffmpeg-kit-aar"
          mkdir -p $AAR_DIR

          # Download the original AAR to extract classes.jar and AndroidManifest.xml.
          # The Java bindings (classes.jar) come from com.antonkarpenko:ffmpeg-kit-full-gpl:2.1.0
          # but we replace all native .so files with our minimal FFmpeg 6 builds.
          ORIG_AAR="/tmp/original.aar"
          echo "Downloading original AAR for Java bindings..."
          curl -fL -o "$ORIG_AAR" \
            "https://repo1.maven.org/maven2/com/antonkarpenko/ffmpeg-kit-full-gpl/2.1.0/ffmpeg-kit-full-gpl-2.1.0.aar"

          # Extract Java bindings and manifest (no native libs — we supply our own)
          cd $AAR_DIR
          unzip -o "$ORIG_AAR" classes.jar AndroidManifest.xml R.txt 2>/dev/null || true
          unzip -o "$ORIG_AAR" "META-INF/*" 2>/dev/null || true

          TOOLCHAIN="$NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64"
          STRIP="${TOOLCHAIN}/bin/llvm-strip"

          for ABI in $ABIS; do
            echo "=== Packaging $ABI ==="
            mkdir -p jni/$ABI

            FFMPEG_PREFIX="/tmp/ffmpeg-out-${ABI}"
            WRAPPER_OUT="/tmp/ffmpegkit-out-${ABI}"

            # Copy all 7 FFmpeg shared libs (NativeLoader.java hard-loads all 7)
            for lib in libavutil libswscale libswresample libavcodec libavformat libavfilter libavdevice; do
              SO=$(find $FFMPEG_PREFIX/lib -name "${lib}.so" -not -type l | head -1)
              if [ -z "$SO" ]; then
                SO=$(find $FFMPEG_PREFIX/lib -name "${lib}.so.*" -not -type l | head -1)
              fi
              if [ -n "$SO" ]; then
                cp "$SO" jni/$ABI/${lib}.so
                $STRIP --strip-unneeded jni/$ABI/${lib}.so
              else
                echo "::error::Missing $lib for $ABI"
                exit 1
              fi
            done

            # Copy the JNI wrapper libs built from arthenica v6 source
            cp "$WRAPPER_OUT/libffmpegkit.so" jni/$ABI/
            $STRIP --strip-unneeded jni/$ABI/libffmpegkit.so

            cp "$WRAPPER_OUT/libffmpegkit_abidetect.so" jni/$ABI/
            $STRIP --strip-unneeded jni/$ABI/libffmpegkit_abidetect.so

            # Copy libc++_shared.so from NDK (required by clang-compiled .so files)
            NDK_LIBCXX=$(find $NDK_HOME -name "libc++_shared.so" -path "*/$ABI/*" | head -1)
            if [ -n "$NDK_LIBCXX" ]; then
              cp "$NDK_LIBCXX" jni/$ABI/
            else
              echo "::warning::libc++_shared.so not found for $ABI"
            fi

            echo "  libs: $(ls jni/$ABI/*.so | wc -l) .so files"
            ls -lh jni/$ABI/
          done

          # Create AAR (zip of classes.jar + AndroidManifest.xml + jni/)
          zip -r /tmp/ffmpeg-kit-minimal-gpl.aar . -x ".*"
          ls -lh /tmp/ffmpeg-kit-minimal-gpl.aar

          echo ""
          echo "=== Size comparison (FFmpeg 6 minimal vs full-gpl original) ==="
          echo "Original (FFmpeg full-gpl): $(du -h "$ORIG_AAR" | cut -f1)"
          echo "Minimal  (FFmpeg 6 + arthenica wrapper): $(du -h /tmp/ffmpeg-kit-minimal-gpl.aar | cut -f1)"

      - name: Upload AAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-kit-minimal-gpl-android
          path: /tmp/ffmpeg-kit-minimal-gpl.aar
          retention-days: 90
