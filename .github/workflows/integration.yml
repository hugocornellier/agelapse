name: Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: Unit Tests (${{ matrix.flutter-channel }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        flutter-channel: [stable, beta]
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ matrix.flutter-channel }}
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run unit tests with coverage
        run: flutter test --coverage

      - name: Upload coverage to Codecov
        if: matrix.flutter-channel == 'stable'
        uses: codecov/codecov-action@v4
        with:
          files: coverage/lcov.info
          flags: unit-tests
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  integration-macos:
    name: Integration macOS ${{ matrix.group }} (${{ matrix.flutter-channel }})
    runs-on: macos-15
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        flutter-channel: [stable, beta]
        group: [fast, video]
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ matrix.flutter-channel }}
          cache: true

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: macos/Pods
          key: pods-macos-${{ hashFiles('macos/Podfile.lock', 'pubspec.lock') }}
          restore-keys: pods-macos-

      - name: Install dependencies
        run: flutter pub get

      - name: Install macOS pods
        working-directory: macos
        run: |
          if pod install 2>/dev/null; then exit 0; fi
          echo "pod install failed, retrying with --repo-update..."
          for attempt in 1 2 3; do
            pod install --repo-update && break
            echo "pod install attempt $attempt failed, retrying in $((attempt * 15))s..."
            [ "$attempt" -eq 3 ] && exit 1
            sleep $((attempt * 15))
          done

      # Aggregator files run all tests in a single build+launch, avoiding
      # the per-file rebuild overhead and the "debug connection" bug.
      - name: Run integration tests
        run: flutter test "integration_test/desktop_${{ matrix.group }}.dart" -d macos --reporter expanded

  integration-ios:
    name: Integration iOS (${{ matrix.flutter-channel }})
    runs-on: macos-15
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        flutter-channel: [stable, beta]
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26.2
        run: sudo xcode-select -s /Applications/Xcode_26.2.app/Contents/Developer

      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ matrix.flutter-channel }}
          cache: true

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: ios/Pods
          key: pods-ios-${{ hashFiles('ios/Podfile.lock', 'pubspec.lock') }}
          restore-keys: pods-ios-

      - name: Install dependencies
        run: flutter pub get

      - name: Install iOS pods
        working-directory: ios
        run: |
          if pod install 2>/dev/null; then exit 0; fi
          echo "pod install failed, retrying with --repo-update..."
          for attempt in 1 2 3; do
            pod install --repo-update && break
            echo "pod install attempt $attempt failed, retrying in $((attempt * 15))s..."
            [ "$attempt" -eq 3 ] && exit 1
            sleep $((attempt * 15))
          done

      - name: Precache iOS artifacts
        run: flutter precache --ios

      - name: Boot iOS simulator
        run: |
          RUNTIME=$(xcrun simctl list runtimes | grep -oE 'com.apple.CoreSimulator.SimRuntime.iOS-[0-9-]+' | tail -1)
          echo "Using runtime: $RUNTIME"
          UDID=$(xcrun simctl create "CI-iPhone" "iPhone 16" "$RUNTIME")
          echo "Created simulator: $UDID"
          xcrun simctl boot "$UDID"
          xcrun simctl bootstatus "$UDID" -b
          echo "SIMULATOR_UDID=$UDID" >> "$GITHUB_ENV"

      # Pre-warm the Xcode build outside of any test timeout window.
      # On Flutter beta the initial build can take 12-13 minutes, which
      # exceeds the test framework's default 12-minute loading timeout.
      # Building here first means the test run starts with a warm cache.
      - name: Prewarm Xcode build
        run: flutter build ios --simulator --debug --no-codesign

      # Aggregator files run all tests in a single build+launch, avoiding
      # the per-file Xcode rebuild overhead (~1 min × 16 files saved).
      - name: Run fast integration tests
        run: |
          set -o pipefail
          mkdir -p test-results
          flutter test integration_test/mobile_fast.dart -d "$SIMULATOR_UDID" --reporter expanded 2>&1 | tee test-results/fast.log

      - name: Run video integration tests
        run: |
          set -o pipefail
          flutter test integration_test/mobile_video.dart -d "$SIMULATOR_UDID" --reporter expanded 2>&1 | tee test-results/video.log

      - name: Upload test logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs-ios-${{ matrix.flutter-channel }}
          path: test-results/

      - name: Shutdown simulator
        if: always()
        run: xcrun simctl shutdown "$SIMULATOR_UDID" 2>/dev/null || true

  integration-android:
    name: Integration Android (${{ matrix.flutter-channel }})
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        flutter-channel: [stable, beta]
    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: false
          android: false
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: false

      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ matrix.flutter-channel }}
          cache: true

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Install dependencies
        run: flutter pub get

      - name: Prewarm Android build
        run: flutter build apk --debug

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      # Aggregator files run all tests in a single build+launch, avoiding
      # the per-file Gradle rebuild overhead (~40s × 17 files saved).
      - name: Run integration tests on Android emulator
        id: android-tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          arch: x86_64
          target: default
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -memory 2048
          disable-animations: true
          script: |
            flutter test integration_test/mobile_fast.dart -d emulator-5554 --reporter expanded 2>&1 | tee /tmp/test-fast.log
            FAST_EXIT=$?
            flutter test integration_test/mobile_video.dart -d emulator-5554 --reporter expanded 2>&1 | tee /tmp/test-video.log
            VIDEO_EXIT=$?
            if [ $FAST_EXIT -ne 0 ] || [ $VIDEO_EXIT -ne 0 ]; then exit 1; fi

  integration-linux:
    name: Integration Linux ${{ matrix.group }} (${{ matrix.flutter-channel }})
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        flutter-channel: [stable, beta]
        group: [fast, video]
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ninja-build libgtk-3-dev libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev libmpv-dev libheif-dev libpng-dev libturbojpeg0-dev xvfb

      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ matrix.flutter-channel }}
          cache: true

      - name: Cache opencv_dart native build
        uses: actions/cache@v4
        with:
          path: .dart_tool/hooks_runner/shared
          key: opencv-native-linux-${{ hashFiles('pubspec.lock') }}
          restore-keys: opencv-native-linux-

      - name: Install dependencies
        run: flutter pub get

      - name: Prewarm Linux build
        run: flutter build linux --debug

      # Aggregator files run all tests in a single build+launch.
      - name: Run integration tests
        run: xvfb-run flutter test "integration_test/desktop_${{ matrix.group }}.dart" -d linux --reporter expanded

  integration-windows:
    name: Integration Windows ${{ matrix.group }} (${{ matrix.flutter-channel }})
    runs-on: windows-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        flutter-channel: [stable, beta]
        group: [fast, video]
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ matrix.flutter-channel }}
          cache: true

      - name: Cache opencv_dart native build
        uses: actions/cache@v4
        with:
          path: .dart_tool/hooks_runner/shared
          key: opencv-native-windows-${{ hashFiles('pubspec.lock') }}
          restore-keys: opencv-native-windows-

      - name: Install dependencies
        run: flutter pub get

      - name: Prewarm Windows build
        run: flutter build windows --debug

      # Aggregator files run all tests in a single build+launch.
      # Handle known libheif DLL teardown crash on Windows where the
      # process crashes during exit after all tests pass.
      - name: Run integration tests
        shell: bash
        run: |
          TEST_OUTPUT=$(mktemp)
          EXIT_CODE=0
          flutter test "integration_test/desktop_${{ matrix.group }}.dart" -d windows --reporter expanded 2>&1 | tee "$TEST_OUTPUT" || EXIT_CODE=$?
          if [ "$EXIT_CODE" -ne 0 ]; then
            if grep -q "tests passed" "$TEST_OUTPUT" && ! grep -q "failed" "$TEST_OUTPUT"; then
              echo "::warning::Tests exited $EXIT_CODE but all tests passed (process teardown crash — ignored)"
            else
              exit 1
            fi
          fi
          rm -f "$TEST_OUTPUT"
