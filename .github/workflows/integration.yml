name: Tests

on:
  pull_request:
  push:

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: Unit Tests (${{ matrix.flutter-channel }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        flutter-channel: [stable, beta]
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ matrix.flutter-channel }}
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run unit tests with coverage
        run: flutter test --coverage

      - name: Upload coverage to Codecov
        if: matrix.flutter-channel == 'stable'
        uses: codecov/codecov-action@v4
        with:
          files: coverage/lcov.info
          flags: unit-tests
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  integration-macos:
    name: Integration macOS ${{ matrix.group }} (${{ matrix.flutter-channel }})
    runs-on: macos-14
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        flutter-channel: [stable, beta]
        group: [fast, video]
        include:
          - group: fast
            test-files: >-
              smoke_test.dart
              app_test.dart
              database_test.dart
              error_handling_test.dart
              image_format_test.dart
              stabilization_test.dart
              export_test.dart
              screenshot_test.dart
              e2e_workflow_test.dart
          - group: video
            test-files: >-
              video_compilation_test.dart
              video_codec_test.dart
              video_playback_test.dart
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ matrix.flutter-channel }}
          cache: true

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: macos/Pods
          key: pods-macos-${{ hashFiles('macos/Podfile.lock', 'pubspec.lock') }}
          restore-keys: pods-macos-

      - name: Install dependencies
        run: flutter pub get

      - name: Install macOS pods
        working-directory: macos
        run: |
          for attempt in 1 2 3; do
            pod install --repo-update && break
            echo "pod install attempt $attempt failed, retrying in $((attempt * 15))s..."
            [ "$attempt" -eq 3 ] && exit 1
            sleep $((attempt * 15))
          done

      - name: Prewarm macOS build
        run: flutter build macos --debug

      # Due to a Flutter macOS test runner bug, tests must be run one file
      # at a time with a process kill between runs. Running them together
      # causes "Failed to foreground app" / "Error waiting for a debug
      # connection" errors.
      - name: Run integration tests (sequential, one file at a time)
        run: |
          set -eo pipefail
          read -ra TEST_FILES <<< "${{ matrix.test-files }}"
          FAILED=()
          for f in "${TEST_FILES[@]}"; do
            echo "========================================="
            echo "Running: $f"
            echo "========================================="
            pkill -9 -f "agelapse" 2>/dev/null || true
            sleep 2
            if ! flutter test "integration_test/$f" -d macos; then
              FAILED+=("$f")
              echo "::error::FAILED: $f"
            fi
          done
          if [ ${#FAILED[@]} -gt 0 ]; then
            echo ""
            echo "========================================="
            echo "FAILED TESTS:"
            printf '  - %s\n' "${FAILED[@]}"
            echo "========================================="
            exit 1
          fi
          echo "All ${#TEST_FILES[@]} test files passed."

  integration-ios:
    name: Integration iOS (${{ matrix.flutter-channel }})
    runs-on: macos-14
    timeout-minutes: 240
    strategy:
      fail-fast: false
      matrix:
        flutter-channel: [stable, beta]
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 16.2
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ matrix.flutter-channel }}
          cache: true

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: ios/Pods
          key: pods-ios-${{ hashFiles('ios/Podfile.lock', 'pubspec.lock') }}
          restore-keys: pods-ios-

      - name: Install dependencies
        run: flutter pub get

      - name: Install iOS pods
        working-directory: ios
        run: |
          for attempt in 1 2 3; do
            pod install --repo-update && break
            echo "pod install attempt $attempt failed, retrying in $((attempt * 15))s..."
            [ "$attempt" -eq 3 ] && exit 1
            sleep $((attempt * 15))
          done

      - name: Precache iOS artifacts
        run: flutter precache --ios

      - name: Boot iOS simulator
        run: |
          RUNTIME=$(xcrun simctl list runtimes | grep -oE 'com.apple.CoreSimulator.SimRuntime.iOS-[0-9-]+' | tail -1)
          echo "Using runtime: $RUNTIME"
          UDID=$(xcrun simctl create "CI-iPhone" "iPhone 15" "$RUNTIME")
          echo "Created simulator: $UDID"
          xcrun simctl boot "$UDID"
          xcrun simctl bootstatus "$UDID" -b
          echo "SIMULATOR_UDID=$UDID" >> "$GITHUB_ENV"

      # Pre-warm the Xcode build outside of any test timeout window.
      # On Flutter beta the initial build can take 12-13 minutes, which
      # exceeds the test framework's default 12-minute loading timeout.
      # Building here first means the test run starts with a warm cache.
      - name: Prewarm Xcode build
        run: flutter build ios --simulator --debug --no-codesign

      - name: Run integration tests
        run: |
          set -o pipefail
          mkdir -p test-results
          flutter test integration_test/ -d "$SIMULATOR_UDID" --reporter expanded 2>&1 | tee test-results/all.log

      - name: Upload test logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs-ios-${{ matrix.flutter-channel }}
          path: test-results/

      - name: Shutdown simulator
        if: always()
        run: xcrun simctl shutdown "$SIMULATOR_UDID" 2>/dev/null || true

  integration-android:
    name: Integration Android (${{ matrix.flutter-channel }})
    runs-on: ubuntu-latest
    timeout-minutes: 150
    strategy:
      fail-fast: false
      matrix:
        flutter-channel: [stable, beta]
    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: false
          android: false
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: false

      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ matrix.flutter-channel }}
          cache: true

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Install dependencies
        run: flutter pub get

      - name: Prewarm Android build
        run: flutter build apk --debug

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run integration tests on Android emulator
        id: android-tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          target: google_apis
          profile: pixel_6
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: flutter test integration_test/ -d emulator-5554 2>&1 | tee /tmp/test-output.log; exit 0

      - name: Verify test results
        run: |
          if grep -q "Some tests failed" /tmp/test-output.log; then
            echo "::error::Integration tests had failures"
            exit 1
          fi
          if grep -qE "^🎉 [0-9]+ tests passed" /tmp/test-output.log; then
            echo "All tests passed"
          else
            echo "::error::Could not verify test results"
            exit 1
          fi

  integration-linux:
    name: Integration Linux ${{ matrix.group }} (${{ matrix.flutter-channel }})
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        flutter-channel: [stable, beta]
        group: [fast, video]
        include:
          - group: fast
            test-files: >-
              smoke_test.dart
              app_test.dart
              database_test.dart
              error_handling_test.dart
              image_format_test.dart
              stabilization_test.dart
              export_test.dart
              screenshot_test.dart
              e2e_workflow_test.dart
          # video_playback_test.dart is excluded on Linux because mpv/media_kit
          # hangs indefinitely under Xvfb with no GPU (same issue as Windows).
          - group: video
            test-files: >-
              video_compilation_test.dart
              video_codec_test.dart
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ninja-build libgtk-3-dev libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev libmpv-dev libheif-dev libpng-dev xvfb

      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ matrix.flutter-channel }}
          cache: true

      - name: Cache opencv_dart native build
        uses: actions/cache@v4
        with:
          path: .dart_tool/hooks_runner/shared
          key: opencv-native-linux-${{ hashFiles('pubspec.lock') }}
          restore-keys: opencv-native-linux-

      - name: Install dependencies
        run: flutter pub get

      - name: Prewarm Linux build
        run: flutter build linux --debug

      # Linux has the same "Error waiting for a debug connection" bug as
      # macOS/Windows when running multiple test files together. Run sequentially.
      - name: Run integration tests (sequential, one file at a time)
        run: |
          set -eo pipefail
          read -ra TEST_FILES <<< "${{ matrix.test-files }}"
          FAILED=()
          for f in "${TEST_FILES[@]}"; do
            echo "========================================="
            echo "Running: $f"
            echo "========================================="
            pkill -9 -f "agelapse" 2>/dev/null || true
            sleep 2
            if ! xvfb-run flutter test "integration_test/$f" -d linux; then
              FAILED+=("$f")
              echo "::error::FAILED: $f"
            fi
          done
          if [ ${#FAILED[@]} -gt 0 ]; then
            echo ""
            echo "========================================="
            echo "FAILED TESTS:"
            printf '  - %s\n' "${FAILED[@]}"
            echo "========================================="
            exit 1
          fi
          echo "All ${#TEST_FILES[@]} test files passed."

  integration-windows:
    name: Integration Windows ${{ matrix.group }} (${{ matrix.flutter-channel }})
    runs-on: windows-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        flutter-channel: [stable, beta]
        group: [fast, video]
        include:
          - group: fast
            test-files: >-
              smoke_test.dart
              app_test.dart
              database_test.dart
              error_handling_test.dart
              image_format_test.dart
              stabilization_test.dart
              export_test.dart
              screenshot_test.dart
              e2e_workflow_test.dart
          # video_playback_test.dart is excluded on Windows because the CI
          # runner has no video playback backend (Windows Media Foundation
          # requires a desktop session with GPU).
          - group: video
            test-files: >-
              video_compilation_test.dart
              video_codec_test.dart
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ matrix.flutter-channel }}
          cache: true

      - name: Cache opencv_dart native build
        uses: actions/cache@v4
        with:
          path: .dart_tool/hooks_runner/shared
          key: opencv-native-windows-${{ hashFiles('pubspec.lock') }}
          restore-keys: opencv-native-windows-

      - name: Install dependencies
        run: flutter pub get

      - name: Prewarm Windows build
        run: flutter build windows --debug

      # Windows has the same "Error waiting for a debug connection" bug as
      # macOS when running multiple test files together. Run sequentially.
      - name: Run integration tests (sequential, one file at a time)
        shell: bash
        run: |
          set -eo pipefail
          IFS=' ' read -ra TEST_FILES <<< "${{ matrix.test-files }}"
          FAILED=()
          for f in "${TEST_FILES[@]}"; do
            echo "========================================="
            echo "Running: $f"
            echo "========================================="
            taskkill //F //IM "agelapse.exe" 2>/dev/null || true
            sleep 2
            TEST_OUTPUT=$(mktemp)
            EXIT_CODE=0
            flutter test "integration_test/$f" -d windows 2>&1 | tee "$TEST_OUTPUT" || EXIT_CODE=$?
            if [ "$EXIT_CODE" -ne 0 ]; then
              # Handle known libheif DLL teardown crash on Windows where the
              # process crashes during exit after all tests pass.
              if grep -q "tests passed" "$TEST_OUTPUT" && ! grep -q "failed" "$TEST_OUTPUT"; then
                echo "::warning::$f exited $EXIT_CODE but all tests passed (process teardown crash — ignored)"
              else
                FAILED+=("$f")
                echo "::error::FAILED: $f"
              fi
            fi
            rm -f "$TEST_OUTPUT"
          done
          if [ ${#FAILED[@]} -gt 0 ]; then
            echo ""
            echo "========================================="
            echo "FAILED TESTS:"
            printf '  - %s\n' "${FAILED[@]}"
            echo "========================================="
            exit 1
          fi
          echo "All ${#TEST_FILES[@]} test files passed."
