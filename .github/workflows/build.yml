name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format-and-analyze:
    name: Format & Analyze (${{ matrix.flutter-channel }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        flutter-channel: [stable, beta]
    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ matrix.flutter-channel }}
          cache: true
          cache-key: 'flutter-:os:-:channel:-:version:-:arch:-ci-format-:hash:'

      - name: Install dependencies
        run: flutter pub get

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze
        run: flutter analyze --fatal-infos .

  build-android:
    name: Build Android (${{ matrix.flutter-channel }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        flutter-channel: [stable, beta]
    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: false
          android: false
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: false

      - uses: actions/checkout@v5

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ matrix.flutter-channel }}
          cache: true
          cache-key: 'flutter-:os:-:channel:-:version:-:arch:-ci-android-:hash:'

      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK (debug)
        run: flutter build apk --debug

  build-ios:
    name: Build iOS (${{ matrix.flutter-channel }})
    runs-on: macos-15
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        flutter-channel: [stable, beta]
    steps:
      - uses: actions/checkout@v5

      - name: Select Xcode 26.3
        run: sudo xcode-select -s /Applications/Xcode_26.3.app/Contents/Developer

      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ matrix.flutter-channel }}
          cache: true
          cache-key: 'flutter-:os:-:channel:-:version:-:arch:-ci-ios-:hash:'

      - name: Cache CocoaPods
        uses: actions/cache@v5
        with:
          path: ios/Pods
          key: pods-ios-${{ hashFiles('ios/Podfile.lock', 'pubspec.lock') }}
          restore-keys: pods-ios-

      - name: Cache opencv_dart native build
        uses: actions/cache@v5
        with:
          path: .dart_tool/hooks_runner/shared
          key: opencv-native-ios-ci-${{ matrix.flutter-channel }}-xcode26.2-${{ hashFiles('pubspec.lock') }}
          restore-keys: opencv-native-ios-ci-${{ matrix.flutter-channel }}-xcode26.2-

      - name: Install dependencies
        run: flutter pub get

      - name: Install iOS pods
        working-directory: ios
        run: |
          for attempt in 1 2 3; do
            pod install --repo-update && break
            echo "pod install attempt $attempt failed, retrying in $((attempt * 15))s..."
            [ "$attempt" -eq 3 ] && exit 1
            sleep $((attempt * 15))
          done

      - name: Build iOS (no codesign)
        run: |
          for attempt in 1 2 3; do
            flutter build ios --debug --no-codesign && exit 0
            echo "flutter build ios attempt $attempt failed, retrying in $((attempt * 30))s..."
            [ "$attempt" -eq 3 ] && exit 1
            sleep $((attempt * 30))
          done

  build-macos:
    name: Build macOS (${{ matrix.flutter-channel }})
    runs-on: macos-15
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        flutter-channel: [stable, beta]
    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ matrix.flutter-channel }}
          cache: true
          cache-key: 'flutter-:os:-:channel:-:version:-:arch:-ci-macos-:hash:'

      - name: Cache CocoaPods
        uses: actions/cache@v5
        with:
          path: macos/Pods
          key: pods-macos-${{ hashFiles('macos/Podfile.lock', 'pubspec.lock') }}
          restore-keys: pods-macos-

      - name: Install dependencies
        run: flutter pub get

      - name: Install macOS pods
        working-directory: macos
        run: |
          for attempt in 1 2 3; do
            pod install --repo-update && break
            echo "pod install attempt $attempt failed, retrying in $((attempt * 15))s..."
            [ "$attempt" -eq 3 ] && exit 1
            sleep $((attempt * 15))
          done

      - name: Build macOS
        run: flutter build macos --debug

  build-linux:
    name: Build Linux (${{ matrix.flutter-channel }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        flutter-channel: [stable, beta]
    steps:
      - uses: actions/checkout@v5

      - name: Install Linux dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ninja-build libgtk-3-dev libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev libmpv-dev libheif-dev libpng-dev libturbojpeg0-dev

      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ matrix.flutter-channel }}
          cache: true
          cache-key: 'flutter-:os:-:channel:-:version:-:arch:-ci-linux-:hash:'

      - name: Cache opencv_dart native build
        uses: actions/cache@v5
        with:
          path: .dart_tool/hooks_runner/shared
          key: opencv-native-linux-ci-${{ matrix.flutter-channel }}-${{ hashFiles('pubspec.lock') }}
          restore-keys: opencv-native-linux-ci-${{ matrix.flutter-channel }}-

      - name: Install dependencies
        run: flutter pub get

      - name: Prefetch mimalloc tarball
        uses: ./.github/actions/prefetch-mimalloc
        with:
          build-mode: debug

      - name: Build Linux
        run: flutter build linux --debug

      - name: Report flutter_assets size
        run: |
          echo "=== flutter_assets total ==="
          du -sh build/linux/*/release/bundle/data/flutter_assets/ 2>/dev/null || du -sh build/linux/*/debug/bundle/data/flutter_assets/ 2>/dev/null || true
          echo "=== .tflite models ==="
          find build/linux -name '*.tflite' -exec ls -lh {} \; 2>/dev/null || true
          echo "=== sample images ==="
          find build/linux -path '*/assets/samples/*' -exec ls -lh {} \; 2>/dev/null || true

  build-windows:
    name: Build Windows (${{ matrix.flutter-channel }})
    runs-on: windows-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        flutter-channel: [stable, beta]
    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ matrix.flutter-channel }}
          cache: true
          cache-key: 'flutter-:os:-:channel:-:version:-:arch:-ci-windows-:hash:'

      - name: Cache opencv_dart native build
        uses: actions/cache@v5
        with:
          path: .dart_tool/hooks_runner/shared
          key: opencv-native-windows-ci-${{ matrix.flutter-channel }}-${{ hashFiles('pubspec.lock') }}
          restore-keys: opencv-native-windows-ci-${{ matrix.flutter-channel }}-

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows
        run: flutter build windows --debug

      - name: Report flutter_assets size
        shell: bash
        run: |
          echo "=== flutter_assets total ==="
          du -sh build/windows/*/runner/Debug/data/flutter_assets/ 2>/dev/null || du -sh build/windows/*/runner/Release/data/flutter_assets/ 2>/dev/null || true
          echo "=== .tflite models ==="
          find build/windows -name '*.tflite' -exec ls -lh {} \; 2>/dev/null || true
          echo "=== sample images ==="
          find build/windows -path '*/assets/samples/*' -exec ls -lh {} \; 2>/dev/null || true
