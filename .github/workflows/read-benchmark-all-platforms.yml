name: Read-Amplification Benchmark (All Platforms)

# Runs the on-device read-amplification A/B/C benchmark (Finding #7) on macOS,
# iOS, Android, Linux and Windows via `flutter test integration_test/... -d`,
# so we can see whether read-once is faster before/after on every platform.
# Output identity is hard-asserted; timings are printed per platform.
on:
  push:
    branches: [perf/windows-creation-time-ffi]
  workflow_dispatch:

concurrency:
  group: read-bench-all-${{ github.ref }}
  cancel-in-progress: true

env:
  BENCH: integration_test/import_read_amplification_benchmark_test.dart

jobs:
  macos:
    name: Read-amp (macOS)
    runs-on: macos-15
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v5
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Cache CocoaPods
        uses: actions/cache@v5
        with:
          path: macos/Pods
          key: pods-macos-${{ hashFiles('macos/Podfile.lock', 'pubspec.lock') }}
          restore-keys: pods-macos-
      - run: flutter pub get
      - name: Install macOS pods
        working-directory: macos
        run: |
          if pod install 2>/dev/null; then exit 0; fi
          for attempt in 1 2 3; do
            pod install --repo-update && break
            [ "$attempt" -eq 3 ] && exit 1
            sleep $((attempt * 15))
          done
      - name: Run benchmark
        run: flutter test "$BENCH" -d macos --reporter expanded

  ios:
    name: Read-amp (iOS)
    runs-on: macos-15
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v5
      - name: Select Xcode 26.2
        run: sudo xcode-select -s /Applications/Xcode_26.2.app/Contents/Developer
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Cache CocoaPods
        uses: actions/cache@v5
        with:
          path: ios/Pods
          key: pods-ios-${{ hashFiles('ios/Podfile.lock', 'pubspec.lock') }}
          restore-keys: pods-ios-
      - name: Cache opencv_dart native build
        uses: actions/cache@v5
        continue-on-error: true
        with:
          path: .dart_tool/hooks_runner/shared
          key: opencv-native-ios-readbench-${{ hashFiles('pubspec.lock') }}
          restore-keys: opencv-native-ios-readbench-
      - run: flutter pub get
      - name: Install iOS pods
        working-directory: ios
        run: |
          if pod install 2>/dev/null; then exit 0; fi
          for attempt in 1 2 3; do
            pod install --repo-update && break
            [ "$attempt" -eq 3 ] && exit 1
            sleep $((attempt * 15))
          done
      - name: Precache iOS artifacts
        run: flutter precache --ios
      - name: Boot iOS simulator
        run: |
          RUNTIME=$(xcrun simctl list runtimes | grep -oE 'com.apple.CoreSimulator.SimRuntime.iOS-[0-9-]+' | tail -1)
          UDID=$(xcrun simctl create "CI-iPhone" "iPhone 16" "$RUNTIME")
          xcrun simctl boot "$UDID"
          xcrun simctl bootstatus "$UDID" -b
          echo "SIMULATOR_UDID=$UDID" >> "$GITHUB_ENV"
      - name: Prewarm Xcode build
        run: |
          for attempt in 1 2 3; do
            flutter build ios --simulator --debug --no-codesign && exit 0
            [ "$attempt" -eq 3 ] && exit 1
            sleep $((attempt * 30))
          done
      - name: Run benchmark
        run: flutter test "$BENCH" -d "$SIMULATOR_UDID" --reporter expanded
      - name: Shutdown simulator
        if: always()
        run: xcrun simctl shutdown "$SIMULATOR_UDID" 2>/dev/null || true

  android:
    name: Read-amp (Android)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: false
          android: false
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: false
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*') }}
          restore-keys: gradle-${{ runner.os }}-
      - run: flutter pub get
      - name: Prewarm Android build
        run: flutter build apk --debug
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: Run benchmark on Android emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          arch: x86_64
          target: default
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -memory 2048
          disable-animations: true
          script: flutter test "$BENCH" -d emulator-5554 --reporter expanded

  linux:
    name: Read-amp (Linux)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v5
      - name: Install Linux dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ninja-build libgtk-3-dev libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev libmpv-dev libheif-dev libpng-dev libturbojpeg0-dev xvfb
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Cache opencv_dart native build
        uses: actions/cache@v5
        continue-on-error: true
        with:
          path: .dart_tool/hooks_runner/shared
          key: opencv-native-linux-readbench-${{ hashFiles('pubspec.lock') }}
          restore-keys: opencv-native-linux-readbench-
      - run: flutter pub get
      - name: Prefetch mimalloc tarball
        uses: ./.github/actions/prefetch-mimalloc
        with:
          build-mode: debug
      - name: Prewarm Linux build
        run: flutter build linux --debug
      - name: Run benchmark
        run: xvfb-run flutter test "$BENCH" -d linux --reporter expanded

  windows:
    name: Read-amp (Windows)
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v5
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Cache opencv_dart native build
        uses: actions/cache@v5
        continue-on-error: true
        with:
          path: .dart_tool/hooks_runner/shared
          key: opencv-native-windows-readbench-${{ hashFiles('pubspec.lock') }}
          restore-keys: opencv-native-windows-readbench-
      - run: flutter pub get
      - name: Prewarm Windows build
        run: flutter build windows --debug
      - name: Run benchmark
        shell: bash
        run: |
          TEST_OUTPUT=$(mktemp)
          EXIT_CODE=0
          flutter test "$BENCH" -d windows --reporter expanded 2>&1 | tee "$TEST_OUTPUT" || EXIT_CODE=$?
          if [ "$EXIT_CODE" -ne 0 ]; then
            if grep -q "All tests passed" "$TEST_OUTPUT" && ! grep -q "Some tests failed" "$TEST_OUTPUT"; then
              echo "::warning::Tests exited $EXIT_CODE but all tests passed (process teardown crash, ignored)"
            else
              exit 1
            fi
          fi
          rm -f "$TEST_OUTPUT"
